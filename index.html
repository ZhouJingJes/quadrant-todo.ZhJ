<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>四象限待办</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23667eea'/><rect x='3' y='3' width='11' height='11' rx='3' fill='white' opacity='0.9'/><rect x='18' y='3' width='11' height='11' rx='3' fill='white' opacity='0.6'/><rect x='3' y='18' width='11' height='11' rx='3' fill='white' opacity='0.6'/><rect x='18' y='18' width='11' height='11' rx='3' fill='white' opacity='0.3'/></svg>">

  <style>
    :root {
      --blur: 18px;
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.25);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.18);
      --text-primary: rgba(255,255,255,0.95);
      --text-secondary: rgba(255,255,255,0.65);
      --text-muted: rgba(255,255,255,0.40);
      --q1-color: #ff6b8a;
      --q2-color: #5bc4f5;
      --q3-color: #f5a623;
      --q4-color: #8fdc6a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #24243e 70%, #1a1a3e 100%);
      color: var(--text-primary);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      top: -150px; left: -150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(102,126,234,0.35) 0%, transparent 70%);
      animation: orb1 12s ease-in-out infinite alternate;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      bottom: -100px; right: -100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(247,111,161,0.28) 0%, transparent 70%);
      animation: orb2 15s ease-in-out infinite alternate;
      pointer-events: none; z-index: 0;
    }
    @keyframes orb1 { from { transform: translate(0,0) scale(1); } to { transform: translate(80px, 60px) scale(1.15); } }
    @keyframes orb2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-60px, -80px) scale(1.2); } }

    .app {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      padding: 16px; gap: 14px;
    }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--glass-border);
      border-radius: 18px; padding: 14px 24px;
      box-shadow: var(--glass-shadow); flex-shrink: 0;
    }

    .stats-group { display: flex; gap: 28px; align-items: center; }
    .stat-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-value { font-size: 22px; font-weight: 700; line-height: 1; letter-spacing: -0.5px; }
    .stat-label { font-size: 11px; color: var(--text-secondary); letter-spacing: 0.5px; }
    .stat-item.total .stat-value { color: #a78bfa; }
    .stat-item.done .stat-value  { color: #6ee7b7; }
    .stat-item.todo .stat-value  { color: #fbbf24; }
    .stat-divider { width: 1px; height: 36px; background: var(--glass-border); }

    .clock-block { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .clock-time {
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 26px; letter-spacing: 1px;
      color: var(--text-primary); font-variant-numeric: tabular-nums;
    }
    .clock-date { font-size: 12px; color: var(--text-secondary); letter-spacing: 0.8px; }

    .grid {
      display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
      gap: 14px; flex: 1; min-height: 0;
    }

    .quadrant {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 16px 16px 60px 16px;
      box-shadow: var(--glass-shadow);
      position: relative; overflow: hidden; min-height: 200px;
      display: flex; flex-direction: column;
      cursor: pointer; transition: border-color 0.25s, box-shadow 0.25s;
    }
    .quadrant:hover { border-color: rgba(255,255,255,0.38); box-shadow: 0 12px 40px rgba(0,0,0,0.25); }

    .quadrant::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      border-radius: 20px 20px 0 0;
    }
    .q1::before { background: linear-gradient(90deg, var(--q1-color), #ff9eb5); }
    .q2::before { background: linear-gradient(90deg, var(--q2-color), #87d4f7); }
    .q3::before { background: linear-gradient(90deg, var(--q3-color), #f7c97a); }
    .q4::before { background: linear-gradient(90deg, var(--q4-color), #b2f085); }

    .quadrant-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; pointer-events: none; }
    .q-badge { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .q1 .q-badge { background: var(--q1-color); box-shadow: 0 0 8px var(--q1-color); }
    .q2 .q-badge { background: var(--q2-color); box-shadow: 0 0 8px var(--q2-color); }
    .q3 .q-badge { background: var(--q3-color); box-shadow: 0 0 8px var(--q3-color); }
    .q4 .q-badge { background: var(--q4-color); box-shadow: 0 0 8px var(--q4-color); }
    .q-title { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; color: var(--text-primary); }
    .q-sub { font-size: 10px; color: var(--text-muted); margin-left: auto; letter-spacing: 0.4px; }

    .todo-list {
      display: flex; flex-direction: column; gap: 7px;
      flex: 1; overflow-y: auto; pointer-events: auto;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    .todo-list::-webkit-scrollbar { width: 4px; }
    .todo-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

    .todo-item {
      display: flex; align-items: flex-start; gap: 8px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 9px 10px;
      cursor: pointer; transition: background 0.2s, transform 0.15s, opacity 0.3s;
      position: relative; animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .todo-item:hover { background: rgba(255,255,255,0.12); }
    .todo-item.completed { opacity: 0.55; }
    .todo-item.completed .todo-name { text-decoration: line-through; color: var(--text-muted); }

    .todo-item.completing { animation: completePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes completePop { 0% { transform: scale(1); } 30% { transform: scale(1.05); } 60% { transform: scale(0.97); } 100% { transform: scale(1); } }

    .todo-item.deleting { animation: deleteSwipe 0.35s ease-in forwards; }
    @keyframes deleteSwipe { from { opacity: 1; transform: translateX(0) scale(1); max-height: 80px; } to { opacity: 0; transform: translateX(30px) scale(0.9); max-height: 0; padding: 0; margin: 0; } }

    .todo-checkbox {
      width: 18px; height: 18px; border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.35); background: transparent;
      cursor: pointer; flex-shrink: 0; position: relative;
      transition: all 0.2s; margin-top: 1px;
    }
    .todo-item.completed .todo-checkbox { border-color: #6ee7b7; background: #6ee7b7; }
    .todo-item.completed .todo-checkbox::after {
      content: ''; position: absolute; left: 3px; top: 0px;
      width: 5px; height: 9px; border: 2px solid #1a2e22;
      border-top: none; border-left: none; transform: rotate(45deg);
    }

    .todo-content { flex: 1; min-width: 0; pointer-events: none; }
    .todo-name { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
    .todo-due { font-size: 10px; color: var(--text-muted); margin-top: 3px; display: flex; align-items: center; gap: 3px; }
    .todo-due.overdue { color: #ff8fa3; }
    .due-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; display: inline-block; }

    .todo-delete {
      width: 20px; height: 20px; border-radius: 50%;
      background: transparent; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s; line-height: 1; padding: 0; margin-top: 0;
    }
    .todo-delete:hover { background: rgba(255,80,80,0.25); color: #ff8fa3; }

    .add-btn {
      position: absolute; bottom: 14px; right: 14px;
      width: 38px; height: 38px; border-radius: 12px; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 300; line-height: 1;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      z-index: 2; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .q1 .add-btn { background: rgba(255,107,138,0.35); color: #ffb3c6; box-shadow: 0 4px 15px rgba(255,107,138,0.3); }
    .q2 .add-btn { background: rgba(91,196,245,0.3); color: #a8e4f7; box-shadow: 0 4px 15px rgba(91,196,245,0.25); }
    .q3 .add-btn { background: rgba(245,166,35,0.3); color: #ffd399; box-shadow: 0 4px 15px rgba(245,166,35,0.25); }
    .q4 .add-btn { background: rgba(143,220,106,0.3); color: #c4f0a8; box-shadow: 0 4px 15px rgba(143,220,106,0.25); }
    .add-btn:hover { transform: scale(1.12) rotate(90deg); }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(10,10,30,0.65);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      z-index: 100; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }

    .modal {
      background: rgba(25, 22, 60, 0.85);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.22); border-radius: 24px;
      padding: 28px; width: 380px; max-width: calc(100vw - 32px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
      transform: scale(0.92) translateY(10px);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-overlay.active .modal { transform: scale(1) translateY(0); }

    .modal-title {
      font-size: 20px; font-weight: 700; color: var(--text-primary);
      margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
    }
    .modal-q-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 500;
      color: var(--text-secondary); letter-spacing: 0.8px;
      text-transform: uppercase; margin-bottom: 7px;
    }
    .form-input, .form-textarea {
      width: 100%; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18); border-radius: 12px;
      padding: 11px 14px; color: var(--text-primary);
      font-family: inherit; font-size: 14px;
      outline: none; transition: border-color 0.2s, background 0.2s;
    }
    .form-input:focus, .form-textarea:focus { border-color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.12); }
    .form-textarea { resize: vertical; min-height: 72px; }
    .form-input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.6); cursor: pointer; }

    .alarm-row {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 12px 14px;
    }
    .alarm-label-text { font-size: 13px; color: var(--text-secondary); }
    .toggle { position: relative; width: 42px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; border-radius: 24px;
      background: rgba(255,255,255,0.15); cursor: pointer; transition: background 0.3s;
    }
    .toggle-slider::before {
      content: ''; position: absolute; height: 18px; width: 18px;
      border-radius: 50%; left: 3px; top: 3px; background: white;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toggle input:checked + .toggle-slider { background: #6ee7b7; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn {
      flex: 1; padding: 12px; border-radius: 12px; border: none;
      font-family: inherit; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-cancel { background: rgba(255,255,255,0.08); color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.15); }
    .btn-cancel:hover { background: rgba(255,255,255,0.13); }
    .btn-save { background: linear-gradient(135deg, #667eea, #764ba2); color: white; box-shadow: 0 4px 15px rgba(102,126,234,0.35); }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(102,126,234,0.45); }

    .notif-banner {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(25,22,60,0.9);
      backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px; padding: 12px 20px;
      font-size: 13px; color: var(--text-primary);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4); z-index: 200;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap;
    }
    .notif-banner.show { transform: translateX(-50%) translateY(0); }

    .confetti-particle {
      position: fixed; width: 8px; height: 8px; border-radius: 2px;
      pointer-events: none; z-index: 300; animation: confettiFall 1s ease-in forwards;
    }
    @keyframes confettiFall { 0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); } 100% { opacity: 0; transform: translateY(120px) rotate(720deg) scale(0.3); } }

    .axis-col-labels { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 0 4px 0; }
    .axis-col-tag { font-size: 10px; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; text-align: center; }

    .empty-hint {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; color: var(--text-muted); font-size: 12px;
      opacity: 0; transition: opacity 0.3s;
    }
    .quadrant:not(:has(.todo-item)) .empty-hint { opacity: 1; }

    .has-alarm::after { content: '\01F514'; font-size: 9px; margin-left: 3px; vertical-align: middle; }

    .form-textarea::-webkit-scrollbar { width: 4px; }
    .form-textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="stats-group">
      <div class="stat-item total">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">总待办</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item done">
        <div class="stat-value" id="stat-done">0</div>
        <div class="stat-label">已完成</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item todo">
        <div class="stat-value" id="stat-todo">0</div>
        <div class="stat-label">未完成</div>
      </div>
    </div>
    <div class="clock-block">
      <div class="clock-time" id="clock-time">00:00:00</div>
      <div class="clock-date" id="clock-date">—</div>
    </div>
  </div>

  <div class="axis-col-labels">
    <div class="axis-col-tag">▲ 紧急</div>
    <div class="axis-col-tag">▽ 不紧急</div>
  </div>

  <div class="grid">
    <div class="quadrant q1" onclick="handleQuadrantClick(event, 0)">
      <div class="quadrant-header"><div class="q-badge"></div><div class="q-title">重要 · 紧急</div><div class="q-sub">立即处理</div></div>
      <div class="todo-list" id="list-0"></div>
      <div class="empty-hint">点击空白处新建待办</div>
      <button class="add-btn" onclick="event.stopPropagation(); openModal(0)" title="新建待办">+</button>
    </div>
    <div class="quadrant q2" onclick="handleQuadrantClick(event, 1)">
      <div class="quadrant-header"><div class="q-badge"></div><div class="q-title">重要 · 不紧急</div><div class="q-sub">计划执行</div></div>
      <div class="todo-list" id="list-1"></div>
      <div class="empty-hint">点击空白处新建待办</div>
      <button class="add-btn" onclick="event.stopPropagation(); openModal(1)" title="新建待办">+</button>
    </div>
    <div class="quadrant q3" onclick="handleQuadrantClick(event, 2)">
      <div class="quadrant-header"><div class="q-badge"></div><div class="q-title">不重要 · 紧急</div><div class="q-sub">授权他人</div></div>
      <div class="todo-list" id="list-2"></div>
      <div class="empty-hint">点击空白处新建待办</div>
      <button class="add-btn" onclick="event.stopPropagation(); openModal(2)" title="新建待办">+</button>
    </div>
    <div class="quadrant q4" onclick="handleQuadrantClick(event, 3)">
      <div class="quadrant-header"><div class="q-badge"></div><div class="q-title">不重要 · 不紧急</div><div class="q-sub">可以放下</div></div>
      <div class="todo-list" id="list-3"></div>
      <div class="empty-hint">点击空白处新建待办</div>
      <button class="add-btn" onclick="event.stopPropagation(); openModal(3)" title="新建待办">+</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">
      <div class="modal-q-dot" id="modal-q-dot"></div>
      <span id="modal-title-text">新建待办</span>
    </div>
    <div class="form-group">
      <label class="form-label" for="input-name">待办名 *</label>
      <input class="form-input" type="text" id="input-name" placeholder="给这件事起个名字…" maxlength="60">
    </div>
    <div class="form-group">
      <label class="form-label" for="input-detail">具体事项（可选）</label>
      <textarea class="form-textarea" id="input-detail" placeholder="详细描述、备注…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label" for="input-due">到期时间</label>
      <input class="form-input" type="datetime-local" id="input-due">
    </div>
    <div class="form-group">
      <div class="alarm-row">
        <span class="alarm-label-text">设置闹钟提醒</span>
        <label class="toggle">
          <input type="checkbox" id="input-alarm" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-save" onclick="saveTodo()">保存</button>
    </div>
  </div>
</div>

<div class="notif-banner" id="notif-banner"></div>

<script>
const STORAGE_KEY = 'quadrant-todos-v2';
const Q_COLORS = ['#ff6b8a', '#5bc4f5', '#f5a623', '#8fdc6a'];
const Q_NAMES  = ['重要 · 紧急', '重要 · 不紧急', '不重要 · 紧急', '不重要 · 不紧急'];
const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];

let todos = [], editingId = null, currentQuadrant = 0, alarmTimers = {};
let notifPermission = localStorage.getItem('notif-permission') || 'default';

function loadData() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) todos = JSON.parse(r); } catch(e) { todos = []; } }
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); }

async function requestNotifPermission() {
  if (!('Notification' in window) || notifPermission === 'granted' || notifPermission === 'denied') return;
  const r = await Notification.requestPermission();
  notifPermission = r; localStorage.setItem('notif-permission', r);
}

function scheduleAlarm(t) {
  if (!t.alarm || !t.due || t.completed || t.deleted) return;
  const ms = new Date(t.due).getTime() - Date.now();
  if (ms <= 0) return;
  if (alarmTimers[t.id]) clearTimeout(alarmTimers[t.id]);
  alarmTimers[t.id] = setTimeout(() => fireAlarm(t), ms);
}

function fireAlarm(t) {
  if (notifPermission === 'granted') {
    new Notification('待办到期提醒', { body: t.name + (t.detail ? '\n' + t.detail : ''), tag: 'todo-' + t.id });
  }
  showBanner('⏰ 「' + t.name + '」已到期！');
}

function scheduleAllAlarms() { todos.forEach(t => scheduleAlarm(t)); }

function updateClock() {
  const n = new Date();
  document.getElementById('clock-time').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0') + ':' + String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock-date').textContent =
    n.getFullYear() + ' / ' + (n.getMonth()+1) + ' / ' + n.getDate() + '  ' + WEEKDAYS[n.getDay()];
}

function updateStats() {
  const a = todos.filter(t => !t.deleted), d = a.filter(t => t.completed).length;
  document.getElementById('stat-total').textContent = a.length;
  document.getElementById('stat-done').textContent = d;
  document.getElementById('stat-todo').textContent = a.length - d;
}

function renderAll() {
  for (let q = 0; q < 4; q++) {
    const list = document.getElementById('list-' + q); list.innerHTML = '';
    todos.filter(t => t.quadrant === q && !t.deleted).forEach(t => list.appendChild(createTodoEl(t)));
  }
  updateStats();
}

function formatDue(due) {
  if (!due) return '';
  const d = new Date(due);
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function isOverdue(due, completed) { return due && !completed && new Date(due) < new Date(); }

function createTodoEl(todo) {
  const div = document.createElement('div');
  div.className = 'todo-item' + (todo.completed ? ' completed' : '');
  div.dataset.id = todo.id;

  const cb = document.createElement('div');
  cb.className = 'todo-checkbox';
  cb.onclick = (e) => { e.stopPropagation(); toggleTodo(todo.id, div); };

  const content = document.createElement('div');
  content.className = 'todo-content';
  const name = document.createElement('div');
  name.className = 'todo-name' + (todo.alarm && todo.due ? ' has-alarm' : '');
  name.textContent = todo.name;
  content.appendChild(name);

  if (todo.due) {
    const due = document.createElement('div');
    due.className = 'todo-due' + (isOverdue(todo.due, todo.completed) ? ' overdue' : '');
    due.innerHTML = '<span class="due-dot"></span>' + formatDue(todo.due);
    content.appendChild(due);
  }

  const del = document.createElement('button');
  del.className = 'todo-delete'; del.textContent = '×'; del.title = '删除';
  del.onclick = (e) => { e.stopPropagation(); deleteTodo(todo.id, div); };

  div.appendChild(cb); div.appendChild(content); div.appendChild(del);
  div.onclick = (e) => { if (e.target === del || e.target === cb) return; openModal(todo.quadrant, todo.id); };
  return div;
}

function spawnConfetti(el) {
  const rect = el.getBoundingClientRect();
  const colors = ['#ff6b8a','#5bc4f5','#f5a623','#8fdc6a','#a78bfa','#fbbf24'];
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-particle';
    p.style.cssText = 'left:' + (rect.left + rect.width/2 + (Math.random()-0.5)*40) + 'px;top:' + (rect.top + rect.height/2) + 'px;background:' + colors[Math.floor(Math.random()*colors.length)] + ';animation-delay:' + (Math.random()*0.2) + 's;animation-duration:' + (0.7+Math.random()*0.5) + 's;';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

function toggleTodo(id, el) {
  const t = todos.find(x => x.id === id); if (!t) return;
  t.completed = !t.completed; saveData();
  if (t.completed) {
    el.classList.add('completing'); spawnConfetti(el);
    setTimeout(() => el.classList.remove('completing'), 500);
    if (alarmTimers[id]) { clearTimeout(alarmTimers[id]); delete alarmTimers[id]; }
  } else { scheduleAlarm(t); }
  el.classList.toggle('completed', t.completed);
  const dueEl = el.querySelector('.todo-due');
  if (dueEl) dueEl.className = 'todo-due' + (isOverdue(t.due, t.completed) ? ' overdue' : '');
  updateStats();
}

function deleteTodo(id, el) {
  el.classList.add('deleting');
  setTimeout(() => {
    const t = todos.find(x => x.id === id); if (t) t.deleted = true;
    if (alarmTimers[id]) { clearTimeout(alarmTimers[id]); delete alarmTimers[id]; }
    saveData(); el.remove(); updateStats();
  }, 350);
}

function getDefaultDue() {
  const n = new Date(); n.setSeconds(0, 0);
  return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0') + 'T' + String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

function openModal(quadrant, id) {
  currentQuadrant = quadrant; editingId = id || null;
  document.getElementById('modal-q-dot').style.background = Q_COLORS[quadrant];
  document.getElementById('modal-q-dot').style.boxShadow = '0 0 8px ' + Q_COLORS[quadrant];
  if (id) {
    const t = todos.find(x => x.id === id); if (!t) return;
    document.getElementById('modal-title-text').textContent = '编辑待办';
    document.getElementById('input-name').value = t.name;
    document.getElementById('input-detail').value = t.detail || '';
    document.getElementById('input-due').value = t.due || getDefaultDue();
    document.getElementById('input-alarm').checked = t.alarm;
  } else {
    document.getElementById('modal-title-text').textContent = '新建待办 — ' + Q_NAMES[quadrant];
    document.getElementById('input-name').value = '';
    document.getElementById('input-detail').value = '';
    document.getElementById('input-due').value = getDefaultDue();
    document.getElementById('input-alarm').checked = true;
  }
  document.getElementById('modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('input-name').focus(), 100);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); editingId = null; }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
function handleQuadrantClick(e, q) { if (e.target.closest('.todo-item') || e.target.closest('.add-btn')) return; openModal(q); }

function saveTodo() {
  const name = document.getElementById('input-name').value.trim();
  if (!name) { document.getElementById('input-name').focus(); document.getElementById('input-name').style.borderColor = '#ff6b8a'; setTimeout(() => document.getElementById('input-name').style.borderColor = '', 1000); return; }
  const due = document.getElementById('input-due').value;
  const alarm = document.getElementById('input-alarm').checked;
  const detail = document.getElementById('input-detail').value.trim();
  if (editingId) {
    const t = todos.find(x => x.id === editingId);
    if (t) { t.name = name; t.detail = detail; t.due = due; t.alarm = alarm; if (alarmTimers[t.id]) { clearTimeout(alarmTimers[t.id]); delete alarmTimers[t.id]; } scheduleAlarm(t); }
  } else {
    const t = { id: Date.now() + Math.random().toString(36).slice(2), quadrant: currentQuadrant, name, detail, due, alarm, completed: false, deleted: false };
    todos.push(t); scheduleAlarm(t); if (alarm && due) requestNotifPermission();
  }
  saveData(); renderAll(); closeModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && e.ctrlKey && document.getElementById('modal-overlay').classList.contains('active')) saveTodo();
});

function showBanner(msg) { const b = document.getElementById('notif-banner'); b.textContent = msg; b.classList.add('show'); setTimeout(() => b.classList.remove('show'), 3500); }

function checkOverdueDues() {
  todos.filter(t => !t.deleted).forEach(t => {
    const el = document.querySelector('[data-id="' + t.id + '"] .todo-due');
    if (el) el.className = 'todo-due' + (isOverdue(t.due, t.completed) ? ' overdue' : '');
  });
}

loadData(); renderAll(); updateClock();
setInterval(updateClock, 1000);
setInterval(checkOverdueDues, 30000);
scheduleAllAlarms();
if (todos.some(t => t.alarm && t.due && !t.completed && !t.deleted && new Date(t.due) > new Date()) && notifPermission === 'default') requestNotifPermission();
</script>
</body>
</html>
